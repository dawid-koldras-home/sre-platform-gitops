          - "finops-evidence"
      links:
    spec:
      type: service
      lifecycle: "alpha"
      owner: platform-team
      system: sre-platform
      dependsOn:
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "prometheus"
      description: "Prometheus server, kube-state-metrics and node-exporter for Kubernetes metrics"
      annotations:
        argocd/app-name: "prometheus"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/instance=prometheus"
        backstage.io/kubernetes-namespace: "prometheus"
        backstage.io/catalog-entity-link: /catalog/default/system/sre-platform
      tags:
          - "kubernetes-metrics"
          - "prometheus-metrics-source"
      links:
          - title: "Prometheus UI"
            url: "https://prometheus.{{ .metadata.customerId }}.platform.local"
            icon: external
          - title: "Prometheus Documentation"
            url: "https://prometheus.io/docs/introduction/overview/"
            icon: external
    spec:
      type: service
      lifecycle: "stable"
      owner: platform-team
      system: sre-platform
      dependsOn:
    