  headlamp.yaml: |
    apiVersion: sre.platform.io/v1alpha1
    kind: Module
    metadata:
      category: operations
      description: 'Kubernetes operations UI with read-only resource visibility: workloads,
        pods, events and logs'
      displayName: Headlamp Operator Console
      maturity: stable
      name: headlamp
      version: 0.43.0
    spec:
      capabilities:
      - kubernetes-read-only-ui
      - resource-visibility
      catalog:
        kubernetesSelector: app.kubernetes.io/instance=headlamp
      conflicts: []
      controlCenter:
        actions: []
        category: Operations
        deepLinks:
        - description: Official Headlamp documentation
          name: Headlamp Documentation
          url: https://headlamp.dev/docs/latest/
        - description: Headlamp source repository
          name: Headlamp GitHub
          url: https://github.com/kubernetes-sigs/headlamp
        displayName: Headlamp Operator Console
        documentationUrl: https://headlamp.dev/docs/latest/
        icon: dashboard
        observabilitySelectors:
          deployment:
            kind: Deployment
            name: headlamp
            namespace: headlamp
        operatorDescription: Read-only Kubernetes operations UI. Provides workload, pod,
          event and log visibility with least-privilege RBAC. Independent of Backstage
          and Argo CD.
        portalCategory: Operations
        statusAdapter: headlamp
      defaultState: disabled
      dependencies: []
      health:
        initialDelay: 10s
        path: /
        period: 30s
        port: 80
        type: http
      inputSchema:
        properties:
          enabled:
            default: false
            type: boolean
          publicURL:
            description: Public HTTPS URL for production OIDC deployment. Required when
              integrations.oidc is configured. Must not contain credentials, query parameters,
              or fragments. Loopback and localhost addresses are rejected.
            type: string
        required: []
        type: object
      profiles: []
      readiness:
        name: headlamp
        namespace: headlamp
        timeout: 120s
        type: deployment
      removal:
        confirmation: required
        dataResources: []
        impactDescription: Headlamp removal stops the Kubernetes operations UI. No persistent
          data is stored by default.
        preservesData: true
      render:
        base: ""
        chart: headlamp
        chartVersion: 0.43.0
        repository: https://kubernetes-sigs.github.io/headlamp/
        type: helm
        values:
          automountServiceAccountToken: true
          clusterRoleBinding:
            clusterRoleName: headlamp-read-only
            create: true
          config:
            enableHelm: false
            inCluster: true
            oidc:
              callbackURL: ""
              clientID: ""
              clientSecret: ""
              externalSecret:
                enabled: false
              issuerURL: ""
              scopes: ""
              secret:
                create: false
            staticPlugins:
              enabled: false
            unsafeUseServiceAccountToken: false
          env:
          - name: HEADLAMP_MODE
            value: local
          extraManifests:
          - |
            apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRole
            metadata:
              name: headlamp-read-only
              labels:
                app.kubernetes.io/instance: headlamp
                app.kubernetes.io/name: headlamp
                app.kubernetes.io/part-of: sre-platform
            rules:
            # Core resources: read-only visibility
            - apiGroups: [""]
              resources:
                - namespaces
                - nodes
                - pods
                - pods/log
                - events
                - services
                - endpoints
                - persistentvolumes
                - persistentvolumeclaims
              verbs: [get, list, watch]
            # Apps resources: workload visibility
            - apiGroups: ["apps"]
              resources:
                - deployments
                - statefulsets
                - daemonsets
                - replicasets
              verbs: [get, list, watch]
            # Batch resources: job visibility
            - apiGroups: ["batch"]
              resources:
                - jobs
                - cronjobs
              verbs: [get, list, watch]
            # Networking resources
            - apiGroups: ["networking.k8s.io"]
              resources:
                - ingresses
                - networkpolicies
              verbs: [get, list, watch]
            # Secrets, ConfigMaps, serviceaccounts/token, pods/exec, pods/attach,
            # pods/portforward, pods/proxy and all mutating verbs are explicitly
            # not granted.
          fullnameOverride: headlamp
          image:
            pullPolicy: IfNotPresent
            registry: ghcr.io
            repository: headlamp-k8s/headlamp
            tag: v0.43.0
          podDisruptionBudget:
            enabled: true
            minAvailable: 0
          podSecurityContext:
            runAsGroup: 101
            runAsNonRoot: true
            runAsUser: 100
            seccompProfile:
              type: RuntimeDefault
          probes:
            livenessProbe:
              failureThreshold: 3
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 3
            readinessProbe:
              failureThreshold: 3
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
            scheme: HTTP
          replicaCount: 1
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 101
            runAsNonRoot: true
            runAsUser: 100
          service:
            port: 80
            type: ClusterIP
          serviceAccount:
            create: true
      resources:
        minimum:
          cpu: 100m
          memory: 128Mi
          storage: "0"
        recommended:
          cpu: 250m
          memory: 256Mi
          storage: "0"
      secrets: []
      supportedVersions:
      - 0.43.x
      upgrade:
        from: []
        migrations: []
        rollback:
          strategy: git-revert
          timeout: 300s
    
