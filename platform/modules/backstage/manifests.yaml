apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: "backstage"
  labels: 
    app.kubernetes.io/name: backstage
    helm.sh/chart: backstage-2.8.2
    app.kubernetes.io/instance: backstage
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: backstage
  annotations:
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: backstage
      app.kubernetes.io/instance: backstage
      app.kubernetes.io/component: backstage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backstage
        helm.sh/chart: backstage-2.8.2
        app.kubernetes.io/instance: backstage
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: backstage
      annotations:
        checksum/app-config: 3b97cf7daaf45ea4b1b5b8e8633c9e038b94198397436f6f07c8a1459ba679dd
    spec:
      serviceAccountName: backstage-read-only
      volumes:
        - configMap:
            name: backstage-local-catalog
          name: local-catalog
        - configMap:
            name: sre-platform-module-selection
          name: module-selection
        - name: backstage-app-config
          configMap:
            name: backstage-app-config
      
      containers:
        - name: backstage-backend
          image: localhost:5001/sre-platform/backstage:1.52.0-local-bbf76e1b9163
          imagePullPolicy: "IfNotPresent"
          command:
            - node
            - packages/backend
          args:
            - "--config"
            - "/app/app-config-from-configmap.yaml"
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /.backstage/health/v1/readiness
              port: 7007
              scheme: HTTP
          livenessProbe:
            httpGet:
              path: /.backstage/health/v1/liveness
              port: 7007
              scheme: HTTP
          startupProbe:
            httpGet:
              path: /.backstage/health/v1/liveness
              port: 7007
              scheme: HTTP
          env:
            - name: APP_CONFIG_backend_listen_port
              value: "7007"
          ports:
            - name: backend
              containerPort: 7007
              protocol: TCP
          volumeMounts:
            - name: backstage-app-config
              mountPath: "/app/app-config-from-configmap.yaml"
              subPath: app-config.yaml
            - mountPath: /app/local-catalog.yaml
              name: local-catalog
              readOnly: true
              subPath: local-catalog.yaml
            - mountPath: /etc/sre-platform/selection.json
              name: module-selection
              readOnly: true
              subPath: selection.json

