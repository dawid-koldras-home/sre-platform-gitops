      app.kubernetes.io/component: backstage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backstage
        helm.sh/chart: backstage-2.8.2
        app.kubernetes.io/instance: backstage
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: backstage
      annotations:
        checksum/app-config: 765bb5303b9fc3f861613dd982e5c6208d4847e30593089a95c85214e36aed36
    spec:
      serviceAccountName: backstage-read-only
      volumes:
        - configMap:
            name: backstage-local-catalog
          name: local-catalog
        - configMap:
            name: sre-platform-module-selection
          name: module-selection
        - configMap:
            name: sre-platform-module-catalog
          name: module-catalog
        - configMap:
            name: sre-platform-backstage-entities
          name: backstage-entities
        - name: backstage-app-config
          configMap:
            name: backstage-app-config
      
      containers:
        - name: backstage-backend
          image: localhost:5001/sre-platform/backstage:1.52.0-local-69e9a90ba48b
          imagePullPolicy: "IfNotPresent"
          command:
            - node
            - packages/backend
          args:
            - "--config"
            - "/app/app-config-from-configmap.yaml"
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /.backstage/health/v1/readiness
              port: 7007
              scheme: HTTP
          livenessProbe:
            httpGet:
              path: /.backstage/health/v1/liveness
              port: 7007
              scheme: HTTP
          startupProbe:
            httpGet:
              path: /.backstage/health/v1/liveness
              port: 7007
              scheme: HTTP
          env:
            - name: APP_CONFIG_backend_listen_port
              value: "7007"
          ports:
            - name: backend
              containerPort: 7007
              protocol: TCP
          volumeMounts:
            - name: backstage-app-config
              mountPath: "/app/app-config-from-configmap.yaml"
              subPath: app-config.yaml
            - mountPath: /app/local-catalog.yaml
              name: local-catalog
              readOnly: true
              subPath: local-catalog.yaml
            - mountPath: /etc/sre-platform/selection.json
              name: module-selection
              readOnly: true
              subPath: selection.json
            - mountPath: /etc/sre-platform/modules
              name: module-catalog
              readOnly: true
            - mountPath: /etc/sre-platform/catalog
              name: backstage-entities
