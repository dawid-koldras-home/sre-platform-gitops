# Source: backstage/templates/app-config-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-app-config
  namespace: "backstage"
data:
  app-config.yaml: |
    app:
      baseUrl: http://localhost:7007
      extensions:
      - page:catalog:
          config:
            path: /
      packages: all
      title: SRE Platform Developer Portal
    argocd:
      appLocatorMethods:
      - instances:
        - name: local
          url: http://localhost:8080
        type: config
      fullDeploymentHistory: false
      refreshInterval: 10000
    auth:
      environment: development
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true
          ownershipEntityRefs:
          - user:default/guest
          - group:default/platform-team
          - group:default/tenant-dawid-local
          userEntityRef: user:default/guest
    backend:
      actions:
        pluginSources:
        - auth
        - catalog
        - scaffolder
      baseUrl: http://localhost:7007
      cors:
        credentials: true
        methods:
        - GET
        - HEAD
        - PATCH
        - POST
        - PUT
        - DELETE
        origin: http://localhost:7007
      csp:
        connect-src:
        - '''self'''
        - 'http:'
        - 'https:'
      database:
        client: better-sqlite3
        connection: ':memory:'
      listen:
        port: 7007
    catalog:
      import:
        entityFilename: catalog-info.yaml
        pullRequestBranchName: backstage-integration
      locations:
      - target: /app/local-catalog.yaml
        type: file
      rules:
      - allow:
        - Component
        - System
        - API
        - Resource
        - Location
        - Template
        - User
        - Group
    kubernetes:
      clusterLocatorMethods:
      - clusters:
        - authProvider: serviceAccount
          name: local
          skipMetricsLookup: true
          skipTLSVerify: false
          url: https://kubernetes.default.svc
        type: config
      customResources:
      - apiVersion: v1alpha1
        group: argoproj.io
        plural: applications
      frontend:
        podDelete:
          enabled: false
      objectTypes: []
      serviceLocatorMethod:
        type: multiTenant
    mcpActions:
      description: Local developer portal for the SRE Platform
      name: SRE Platform Backstage
    organization:
      name: SRE Platform
    permission:
      enabled: true
    srePlatform:
      authProvider: guest
      selectionArtifactPath: /etc/sre-platform/selection.json
      tenant: dawid-local
    techdocs:
      builder: local
      generator:
        runIn: local
      publisher:
        type: local
