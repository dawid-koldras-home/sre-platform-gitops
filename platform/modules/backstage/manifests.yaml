    apiVersion: sre.platform.io/v1alpha1
    kind: Module
    metadata:
      category: core
      description: GitOps reconciliation and deployment status
      displayName: Argo CD
      maturity: stable
      name: argocd
      version: 2.11.7
    spec:
      capabilities:
      - gitops-reconciliation
      - application-sync
      - drift-detection
      catalog:
        kubernetesSelector: app.kubernetes.io/instance=argocd
      conflicts: []
      controlCenter:
        actions:
        - description: Trigger synchronization of the Argo CD application
          displayName: Sync Application
          name: sync
          requiredRole: operator
        - description: Retry failed sync operations
          displayName: Retry Failed
          name: retry
          requiredRole: operator
        category: GitOps
        deepLinks:
        - description: Open Argo CD web interface
          name: Argo CD UI
          url: https://argocd.{{ .metadata.customerId }}.platform.local
        displayName: Argo CD
        documentationUrl: https://argo-cd.readthedocs.io/
        icon: gitops
        operatorDescription: GitOps reconciliation engine that syncs desired state from
          Git to Kubernetes clusters
        portalCategory: Platform Core
        statusAdapter: argocd
      defaultState: enabled
      dependencies:
      - module: cert-manager
      health:
        initialDelay: 10s
        path: /healthz
        period: 30s
        port: 8080
        type: http
      profiles:
      - core
      - modernization
      - full
      - external-services
      - air-gapped
      readiness:
        name: argocd-server
        namespace: argocd
        timeout: 300s
        type: deployment
      removal:
        confirmation: required
        dataResources:
        - kind: PersistentVolumeClaim
          namespace: argocd
        impactDescription: Argo CD removal stops GitOps reconciliation. Customer workloads
          continue running.
        preservesData: true
      render:
        base: ./charts
        chart: argo-cd
        chartVersion: 7.3.11
        repository: https://argoproj.github.io/argo-helm
        type: helm
        values:
          applicationSet:
            enabled: true
          controller:
            replicas: 1
            resources:
              limits:
                cpu: 1000m
                memory: 1Gi
              requests:
                cpu: 250m
                memory: 512Mi
          global:
            image:
              tag: v2.11.7
          notifications:
            enabled: true
          repoServer:
            replicas: 2
          server:
            autoscaling:
              enabled: false
            replicas: 2
      resources:
        minimum:
          cpu: 500m
          memory: 512Mi
          storage: 10Gi
        recommended:
          cpu: 1000m
          memory: 1Gi
          storage: 20Gi
      secrets:
      - name: adminPassword
        redacted: true
        ref: env://ARGOCD_ADMIN_PASSWORD
        required: false
      supportedVersions:
      - 2.11.x
      - 2.10.x
      upgrade:
        from:
        - 2.10.x
        migrations: []
        rollback:
          strategy: helm
          timeout: 600s
    
