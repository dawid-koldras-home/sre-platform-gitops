        chart: opencost
        chartVersion: 2.2.1
        repository: https://opencost.github.io/opencost-helm-chart
        type: helm
        values:
          opencost:
            cloudProvider:
            - none
            clusterName: ""
            export:
              enabled: false
            productConfig:
              currencyCode: USD
            prometheus:
              external:
                enabled: true
                url: http://prometheus-server.prometheus.svc.cluster.local:80
              internal:
                enabled: false
      resources:
        minimum:
          cpu: 100m
          memory: 256Mi
          storage: "0"
        recommended:
          cpu: 250m
          memory: 512Mi
          storage: "0"
      secrets: []
      supportedVersions:
      - 1.116.x
      upgrade:
        from: []
        migrations: []
        rollback:
          strategy: git-revert
          timeout: 300s
    
  prometheus.yaml: |
    apiVersion: sre.platform.io/v1alpha1
    kind: Module
    metadata:
      category: metrics
      description: Prometheus server, kube-state-metrics and node-exporter for Kubernetes
        metrics
      displayName: Prometheus Metrics Source
      maturity: stable
      name: prometheus
      version: 29.18.0
    spec:
      capabilities:
      - kubernetes-metrics
      - prometheus-metrics-source
      catalog:
        kubernetesSelector: app.kubernetes.io/instance=prometheus
      conflicts: []
      controlCenter:
        actions:
        - description: Trigger a Prometheus configuration reload without restarting the
            server
          displayName: Reload Configuration
          name: reload
          requiredRole: operator
        category: Metrics
        deepLinks:
        - description: Open Prometheus expression browser
          name: Prometheus UI
          url: https://prometheus.{{ .metadata.customerId }}.platform.local
        - description: Official Prometheus documentation
          name: Prometheus Documentation
          url: https://prometheus.io/docs/introduction/overview/
        displayName: Prometheus Metrics Source
        documentationUrl: https://prometheus.io/docs/introduction/overview/
        icon: monitoring
        observabilitySelectors:
          server:
            kind: StatefulSet
            name: prometheus-server
            namespace: prometheus
        operatorDescription: Prometheus server with kube-state-metrics and node-exporter
          for Kubernetes cluster metrics. Provides the in-cluster metrics source for OpenCost
          cost allocation.
        portalCategory: Observability
        statusAdapter: prometheus
      defaultState: disabled
      dependencies: []
      health:
        initialDelay: 10s
        path: /-/ready
        period: 30s
        port: 9090
        type: http
      inputSchema:
        properties:
          enabled:
            default: false
            type: boolean
          retention:
            default: 7d
            description: Prometheus data retention duration. Default 7 days suitable for
              local/demo. Production deployments should use a longer retention with backed-up
              persistent storage.
            type: string
          storageSize:
            default: 10Gi
            description: Persistent volume claim size for Prometheus server. Default 10Gi
              suitable for local/demo. Production sizing depends on metrics cardinality
              and retention.
            type: string
        required: []
        type: object
      profiles: []
      readiness:
        name: prometheus-server
        namespace: prometheus
        timeout: 300s
        type: deployment
      removal:
        confirmation: required
        dataResources:
        - kind: PersistentVolumeClaim
          namespace: prometheus
        impactDescription: Prometheus removal deletes all stored time-series metrics data.
          OpenCost and any other consumers relying on this Prometheus instance will lose
          their metrics source.
        preservesData: false
      render:
        base: ./charts
        chart: prometheus
        chartVersion: 29.18.0
        repository: https://prometheus-community.github.io/helm-charts
        type: helm
        values:
          alertmanager:
            enabled: false
          fullnameOverride: prometheus
          kube-state-metrics:
            enabled: true
            resources:
              limits:
                cpu: 100m
                memory: 256Mi
              requests:
                cpu: 50m
                memory: 128Mi
          prometheus-node-exporter:
            enabled: true
            resources:
              limits:
                cpu: 100m
                memory: 128Mi
              requests:
                cpu: 50m
                memory: 64Mi
          prometheus-pushgateway:
            enabled: false
          server:
            persistentVolume:
              enabled: true
              size: 10Gi
            resources:
              limits:
                cpu: 500m
                memory: 1Gi
              requests:
                cpu: 250m
                memory: 512Mi
            retention: 7d
      resources:
        minimum:
          cpu: 500m
          memory: 1Gi
          storage: 10Gi
        recommended:
          cpu: 1000m
          memory: 2Gi
          storage: 50Gi
      secrets: []
      supportedVersions:
      - 29.x
      upgrade:
        from: []
        migrations: []
        rollback:
          strategy: git-revert
          timeout: 300s
    

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-platform-backstage-entities
  namespace: backstage
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/managed-by: srectl
  annotations:
    sre-platform.io/api-version: v1
data:
  catalog-info.yaml: |
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: sre-platform
      description: SRE Platform installed by srectl
      annotations:
        sre-platform.io/customer-id: "dawid-local"
    spec:
      owner: platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "argocd"
      description: "GitOps reconciliation and deployment status"
      annotations:
        argocd/app-name: "argocd"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/instance=argocd"
        backstage.io/kubernetes-namespace: "argocd"
        backstage.io/catalog-entity-link: /catalog/default/system/sre-platform
      tags:
          - "gitops-reconciliation"
          - "application-sync"
          - "drift-detection"
      links:
          - title: "Argo CD UI"
            url: "https://argocd.{{ .metadata.customerId }}.platform.local"
            icon: external
    spec:
      type: service
      lifecycle: "stable"
      owner: platform-team
      system: sre-platform
      dependsOn:
          - component:"cert-manager"
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "backstage"
      description: "Developer portal with catalog, templates, TechDocs and Argo CD view"
      annotations:
        argocd/app-name: "backstage"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/instance=backstage"
        backstage.io/kubernetes-namespace: "backstage"
        backstage.io/catalog-entity-link: /catalog/default/system/sre-platform
      tags:
          - "developer-portal"
          - "service-catalog"
          - "techdocs"
          - "software-templates"
      links:
          - title: "Backstage Portal"
            url: "https://portal.{{ .metadata.customerId }}.platform.local"
            icon: external
    spec:
      type: website
      lifecycle: "stable"
      owner: platform-team
      system: sre-platform
      dependsOn:
          - component:"argocd"
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "cert-manager"
      description: "Certificate management for Kubernetes — issues and renews TLS certificates"
      annotations:
        argocd/app-name: "cert-manager"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/instance=cert-manager"
        backstage.io/kubernetes-namespace: "cert-manager"
        backstage.io/catalog-entity-link: /catalog/default/system/sre-platform
      tags:
          - "certificate-management"
          - "tls-issuance"
      links:
          - title: "cert-manager docs"
            url: "https://cert-manager.io/docs/"
            icon: external
    spec:
      type: service
      lifecycle: "stable"
      owner: platform-team
      system: sre-platform
      dependsOn:
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "clickstack"
      description: "Unified logs, traces, metrics and session data on ClickHouse"
      annotations:
        argocd/app-name: "clickstack"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/part-of=sre-platform,app.kubernetes.io/name=clickstack"
        backstage.io/kubernetes-namespace: "clickstack"
        backstage.io/catalog-entity-link: /catalog/default/system/sre-platform
      tags:
          - "log-ingestion"
          - "trace-ingestion"
          - "metric-ingestion"
          - "observability-storage"
      links:
    spec:
      type: service
      lifecycle: "beta"
      owner: platform-team
      system: sre-platform
      dependsOn:
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "headlamp"
      description: "Kubernetes operations UI with read-only resource visibility: workloads, pods, events and logs"
      annotations:
        argocd/app-name: "headlamp"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/instance=headlamp"
        backstage.io/kubernetes-namespace: "headlamp"
        backstage.io/catalog-entity-link: /catalog/default/system/sre-platform
      tags:
          - "kubernetes-read-only-ui"
          - "resource-visibility"
      links:
          - title: "Headlamp Documentation"
            url: "https://headlamp.dev/docs/latest/"
            icon: external
          - title: "Headlamp GitHub"
            url: "https://github.com/kubernetes-sigs/headlamp"
            icon: external
    spec:
      type: service
      lifecycle: "stable"
      owner: platform-team
      system: sre-platform
      dependsOn:
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "kyverno"
      description: "Kubernetes-native policy engine — validates and mutates resources"
      annotations:
        argocd/app-name: "kyverno"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/instance=kyverno"
        backstage.io/kubernetes-namespace: "kyverno"
        backstage.io/catalog-entity-link: /catalog/default/system/sre-platform
      tags:
          - "policy-enforcement"
          - "resource-validation"
          - "resource-mutation"
      links:
          - title: "Kyverno UI"
            url: "https://kyverno.io/policy-management/"
            icon: external
    spec:
      type: service
      lifecycle: "stable"
      owner: platform-team
      system: sre-platform
      dependsOn:
          - component:"cert-manager"
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "opencost"
      description: "Self-hosted Kubernetes allocation and cost evidence"
      annotations:
        argocd/app-name: "opencost"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/instance=opencost"
        backstage.io/kubernetes-namespace: "opencost"
