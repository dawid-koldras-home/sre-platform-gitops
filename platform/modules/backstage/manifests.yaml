---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sre-platform-backstage-entities
  namespace: backstage
  labels:
    app.kubernetes.io/part-of: sre-platform
    app.kubernetes.io/managed-by: srectl
  annotations:
    sre-platform.io/api-version: v1
data:
  catalog-info.yaml: |
    apiVersion: backstage.io/v1alpha1
    kind: System
    metadata:
      name: sre-platform
      description: SRE Platform installed by srectl
      annotations:
        sre-platform.io/customer-id: "dawid-local"
    spec:
      owner: platform-team
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "argocd"
      description: "GitOps reconciliation and deployment status"
      annotations:
        argocd/app-name: "argocd"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/instance=argocd"
        backstage.io/kubernetes-namespace: "argocd"
        backstage.io/catalog-entity-link: /catalog/default/system/sre-platform
      tags:
          - "gitops-reconciliation"
          - "application-sync"
          - "drift-detection"
      links:
          - title: "Argo CD UI"
            url: "https://argocd.{{ .metadata.customerId }}.platform.local"
            icon: external
    spec:
      type: service
      lifecycle: "stable"
      owner: platform-team
      system: sre-platform
      dependsOn:
          - component:"cert-manager"
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "backstage"
      description: "Developer portal with catalog, templates, TechDocs and Argo CD view"
      annotations:
        argocd/app-name: "backstage"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/instance=backstage"
        backstage.io/kubernetes-namespace: "backstage"
        backstage.io/catalog-entity-link: /catalog/default/system/sre-platform
      tags:
          - "developer-portal"
          - "service-catalog"
          - "techdocs"
          - "software-templates"
      links:
          - title: "Backstage Portal"
            url: "https://portal.{{ .metadata.customerId }}.platform.local"
            icon: external
    spec:
      type: website
      lifecycle: "stable"
      owner: platform-team
      system: sre-platform
      dependsOn:
          - component:"argocd"
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "cert-manager"
      description: "Certificate management for Kubernetes — issues and renews TLS certificates"
      annotations:
        argocd/app-name: "cert-manager"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/instance=cert-manager"
        backstage.io/kubernetes-namespace: "cert-manager"
        backstage.io/catalog-entity-link: /catalog/default/system/sre-platform
      tags:
          - "certificate-management"
          - "tls-issuance"
      links:
          - title: "cert-manager docs"
            url: "https://cert-manager.io/docs/"
            icon: external
    spec:
      type: service
      lifecycle: "stable"
      owner: platform-team
      system: sre-platform
      dependsOn:
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "clickstack"
      description: "Unified logs, traces, metrics and session data on ClickHouse"
      annotations:
        argocd/app-name: "clickstack"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/part-of=sre-platform,app.kubernetes.io/name=clickstack"
        backstage.io/kubernetes-namespace: "clickstack"
        backstage.io/catalog-entity-link: /catalog/default/system/sre-platform
      tags:
          - "log-ingestion"
          - "trace-ingestion"
          - "metric-ingestion"
          - "observability-storage"
      links:
    spec:
      type: service
      lifecycle: "beta"
      owner: platform-team
      system: sre-platform
      dependsOn:
    ---
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: "kyverno"
      description: "Kubernetes-native policy engine — validates and mutates resources"
      annotations:
        argocd/app-name: "kyverno"
        argocd/instance-name: local
        backstage.io/kubernetes-label-selector: "app.kubernetes.io/instance=kyverno"
        backstage.io/kubernetes-namespace: "kyverno"
        backstage.io/catalog-entity-link: /catalog/default/system/sre-platform
      tags:
          - "policy-enforcement"
          - "resource-validation"
          - "resource-mutation"
      links:
          - title: "Kyverno UI"
            url: "https://kyverno.io/policy-management/"
            icon: external
    spec:
      type: service
      lifecycle: "stable"
      owner: platform-team
      system: sre-platform
      dependsOn:
          - component:"cert-manager"
    